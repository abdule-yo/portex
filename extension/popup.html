<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portex</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:       #0f0f11;
        --surface:  #1a1a1f;
        --border:   #2a2a35;
        --text:     #e8e8f0;
        --muted:    #6b6b7d;
        --accent:   #7c6ef7;
        --accent-h: #9282ff;
        --danger:   #e05252;
        --success:  #52c77f;
        --radius:   8px;
        --font:     system-ui, -apple-system, sans-serif;
      }

      body {
        width: 380px;
        min-height: 540px;
        max-height: 600px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 10px;
        border-bottom: 1px solid var(--border);
      }
      header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }

      #status-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--muted);
      }
      #status-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--muted);
        transition: background 0.3s;
      }
      #status-dot.ready   { background: var(--success); }
      #status-dot.loading { background: #e5a550; }
      #status-dot.error   { background: var(--danger); }

      nav { display: flex; border-bottom: 1px solid var(--border); }
      nav button {
        flex: 1;
        padding: 9px 0;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
      }
      nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

      .view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
      .view[hidden] { display: none; }

      #search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); }
      #search-input {
        width: 100%;
        padding: 7px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 12px;
        outline: none;
        transition: border-color 0.15s;
      }
      #search-input:focus { border-color: var(--accent); }

      #sessions-list { flex: 1; overflow-y: auto; padding: 6px 0; }
      #sessions-list::-webkit-scrollbar { width: 4px; }
      #sessions-list::-webkit-scrollbar-track { background: transparent; }
      #sessions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .session-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 9px 14px;
        cursor: pointer;
        border-left: 3px solid transparent;
        transition: background 0.1s, border-color 0.1s;
      }
      .session-item:hover { background: var(--surface); }
      .session-item.selected { background: var(--surface); border-left-color: var(--accent); }

      .session-provider-badge {
        flex-shrink: 0;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        padding: 2px 5px;
        border-radius: 4px;
        background: var(--border);
        color: var(--muted);
        margin-top: 1px;
      }
      .session-provider-badge.chatgpt { background: #1a3a2a; color: #52c77f; }
      .session-provider-badge.claude  { background: #2a1a3a; color: #a07cf7; }
      .session-provider-badge.gemini  { background: #3a2a1a; color: #e5a550; }

      .session-meta { flex: 1; min-width: 0; }
      .session-title {
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text);
      }
      .session-subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .session-summary-tag {
        display: inline-block;
        font-size: 10px;
        padding: 1px 5px;
        border-radius: 3px;
        background: #1a2a1a;
        color: var(--success);
        margin-left: 5px;
      }

      #sessions-empty {
        padding: 32px 16px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      #action-bar {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
        padding: 10px 12px;
        border-top: 1px solid var(--border);
      }
      #action-bar button {
        padding: 7px 0;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text);
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      }
      #action-bar button:hover:not(:disabled) { background: #252530; border-color: var(--accent); }
      #action-bar button:disabled { opacity: 0.35; cursor: not-allowed; }
      #btn-save {
        grid-column: 1 / -1;
        border-color: var(--accent) !important;
        color: var(--accent) !important;
        font-weight: 600 !important;
      }
      #btn-save:hover:not(:disabled) { background: #1e1a3a !important; }
      #btn-delete { color: var(--danger) !important; }

      #inject-row { display: flex; gap: 6px; padding: 0 12px 10px; }
      #inject-target {
        flex: 1;
        padding: 7px 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 11px;
        outline: none;
      }
      #inject-target:focus { border-color: var(--accent); }
      #btn-inject {
        flex: 1;
        padding: 7px 0;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text);
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      #btn-inject:hover:not(:disabled) { background: #252530; border-color: var(--accent); }
      #btn-inject:disabled { opacity: 0.35; cursor: not-allowed; }

      #settings-view {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow-y: auto;
      }
      .settings-group { display: flex; flex-direction: column; gap: 5px; }
      .settings-group label {
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .settings-group input,
      .settings-group select {
        padding: 8px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 12px;
        outline: none;
        transition: border-color 0.15s;
      }
      .settings-group input:focus,
      .settings-group select:focus { border-color: var(--accent); }
      .settings-group input[type="password"] { font-family: monospace; letter-spacing: 2px; }

      #btn-save-settings {
        padding: 9px;
        background: var(--accent);
        border: none;
        border-radius: var(--radius);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      #btn-save-settings:hover { background: var(--accent-h); }

      #toast {
        position: fixed;
        bottom: 56px;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 7px 14px;
        font-size: 12px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s, transform 0.2s;
        white-space: nowrap;
        max-width: 340px;
        overflow: hidden;
        text-overflow: ellipsis;
        z-index: 100;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      #toast.error { border-color: var(--danger); color: var(--danger); }
      #toast.success { border-color: var(--success); color: var(--success); }
    </style>
  </head>

  <body>
    <header>
      <h1>Portex</h1>
      <div id="status-indicator">
        <div id="status-dot" class="loading"></div>
        <span id="status-label">Loading…</span>
      </div>
    </header>

    <nav>
      <button id="tab-sessions" class="active" data-view="sessions-view">Sessions</button>
      <button id="tab-settings" data-view="settings-view">Settings</button>
    </nav>

    <div id="sessions-view" class="view">
      <div id="search-wrap">
        <input id="search-input" type="search" placeholder="Search saved sessions…" autocomplete="off" />
      </div>

      <div id="sessions-list">
        <div id="sessions-empty">
          No saved sessions yet.<br />Open a ChatGPT or Claude chat and click <strong>Save Chat</strong>.
        </div>
      </div>

      <div id="inject-row">
        <select id="inject-target" disabled>
          <option value="chatgpt">→ ChatGPT</option>
          <option value="claude">→ Claude</option>
          <option value="gemini">→ Gemini</option>
        </select>
        <button id="btn-inject" disabled>Inject</button>
      </div>

      <div id="action-bar">
        <button id="btn-save">Save Current Chat</button>
        <button id="btn-summarize" disabled>Summarize</button>
        <button id="btn-export" disabled>Export</button>
        <button id="btn-delete" disabled>Delete</button>
      </div>
    </div>

    <div id="settings-view" class="view" hidden>
      <div class="settings-group">
        <label>API Key (OpenAI or Anthropic)</label>
        <input id="api-key-input" type="password" placeholder="sk-… or sk-ant-…" autocomplete="off" />
      </div>
      <div class="settings-group">
        <label>Summarization Model</label>
        <select id="model-select">
          <option value="gpt-4o-mini">GPT-4o Mini (fast, cheap)</option>
          <option value="gpt-4o">GPT-4o</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku (fast)</option>
          <option value="claude-sonnet-4-6">Claude Sonnet</option>
        </select>
      </div>
      <button id="btn-save-settings">Save Settings</button>
    </div>

    <div id="toast"></div>

    <!-- Load order matters: Go runtime → bridge → app -->
    <script src="wasm_exec.js"></script>
    <script src="wasm_bridge.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
